{% extends "base.html" %}
{% block title %}Forgot Password — Synent Auth{% endblock %}

{% block content %}
<h1 class="auth-title">Reset password.</h1>
<p class="auth-subtitle">Enter your email and we'll send a reset link if the account exists.</p>

<form method="POST" action="{{ url_for('forgot_password') }}" data-validate>

  <div class="form-group">
    <label for="email">Email Address</label>
    <div class="input-wrap">
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        autocomplete="email"
        required
      />
      <span class="icon">✉</span>
    </div>
    <span class="field-error"></span>
  </div>

  <button type="submit" class="btn-primary">Send Reset Link →</button>
</form>

<p class="form-footer">
  Remembered it? <a href="{{ url_for('login') }}">Back to login</a>
</p>
{% endblock %}
